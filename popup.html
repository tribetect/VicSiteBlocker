<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 250px; 
      padding: 15px; 
      font-family: sans-serif; 
      text-align: center; 
    }
    h3 { margin: 0 0 15px 0; font-size: 16px; }
    
    /* Toggle Switch Styling */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #2196F3; }
    input:checked + .slider:before { transform: translateX(26px); }

    /* Stats & Links */
    .stats { font-size: 12px; color: #666; margin-bottom: 15px; }
    .links { display: flex; justify-content: space-between; font-size: 12px; }
    .links a { text-decoration: none; color: #2196F3; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h3>Site Blocker</h3>
  
  <div class="toggle-container">
    <label class="switch">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
    <span id="statusText" style="margin-left: 10px; font-weight: bold;">Enabled</span>
  </div>

  <div class="stats" id="domainCount">Loading...</div>

  <div class="links">
    <a href="#" id="optionsLink">Manage List</a>
    <a href="#" id="helpLink">Help</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
